services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_DATABASE}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - app_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ['node', 'build/bin/server.js']
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: '3333'
      HOST: '0.0.0.0'
    ports:
      - '${PORT:-3333}:3333'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 1g
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - app_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ['node', 'build/ace.js', 'queue:listen']
    env_file: .env.production
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - app_network

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  app_network:
    driver: bridge
